services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlplatform
      POSTGRES_PASSWORD: mlplatform
      POSTGRES_DB: mlplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlplatform"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  taskqueue-api:
    image: ghcr.io/tradaokamsa/go-taskqueue:latest
    command: ["/server"]
    environment:
      DATABASE_URL: "postgres://mlplatform:mlplatform@postgres:5432/mlplatform?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      PORT: "8081"
      LOG_LEVEL: "debug"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  taskqueue-worker:
    image: ghcr.io/tradaokamsa/go-taskqueue:latest
    command: ["/worker"]
    environment:
      DATABASE_URL: "postgres://mlplatform:mlplatform@postgres:5432/mlplatform?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      EXECUTOR_TYPE: "webhook"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data: